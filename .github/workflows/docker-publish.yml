name: Docker Build and Publish

on:
  workflow_call:
    inputs:
      image_name:
        description: "Override default image name (defaults to repo name)"
        required: false
        type: string
    outputs:
      image_size:
        description: "The uncompressed size of the built Docker image"
        value: ${{ jobs.build.outputs.final_size }}
      

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ inputs.image_name || github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      final_size: ${{ steps.calc-size.outputs.size }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Calculate Image Size
        id: calc-size
        run: |
          # Force lowercase for GHCR
          RAW_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE_NAME=$(echo "$RAW_IMAGE" | tr '[:upper:]' '[:lower:]')
          
          # Use the primary version tag generated by docker-metadata-action
          FULL_IMAGE="$IMAGE_NAME:${{ steps.meta.outputs.version }}"

          echo "Pulling $FULL_IMAGE to calculate local size..."
          for i in {1..5}; do
            if docker pull "$FULL_IMAGE"; then
              break
            fi
            echo "Manifest not ready yet. Retrying in 5s..."
            sleep 5
          done

          SIZE=$(docker images "$FULL_IMAGE" --format "{{.Size}}")
          if [ -z "$SIZE" ]; then SIZE="unknown"; fi

          echo "Size calculated: $SIZE"
          echo "size=$SIZE" >> $GITHUB_OUTPUT
